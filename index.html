<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مصحف التدبر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4EFE4;
    --paper-2:#EBE3D2;
    --ink:#2B2620;
    --ink-soft:#6B6355;
    --gold:#A8863B;
    --gold-deep:#7C6329;
    --line:#D9CFB8;
    --card:#FBF8F1;
    --error:#B3413A;
    --success:#3E7C5C;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(168,134,59,0.05), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(168,134,59,0.05), transparent 40%);
    color:var(--ink);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
  }

  .top-bar{
    display:flex;
    justify-content:flex-end;
    padding:14px 24px 0;
  }
  .auth-link{
    font-size:13px;
    color:var(--gold-deep);
    text-decoration:none;
    border:1px solid var(--line);
    padding:7px 16px;
    border-radius:20px;
    background:var(--card);
    cursor:pointer;
    transition:border-color .15s;
    font-family:'Tajawal', sans-serif;
  }
  .auth-link:hover{ border-color:var(--gold); }
  .auth-link.logged-in{
    color:var(--ink-soft);
    background:transparent;
  }

  header{
    text-align:center;
    padding:40px 20px 32px;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  header::after{
    content:"";
    position:absolute; bottom:-1px; right:50%; transform:translateX(50%);
    width:120px; height:3px; background:var(--gold);
  }
  h1{
    font-family:'Amiri', serif;
    font-size:44px;
    font-weight:700;
    color:var(--gold-deep);
    letter-spacing:1px;
  }
  .tagline{
    margin-top:10px;
    font-size:15px;
    color:var(--ink-soft);
    font-weight:300;
  }
  .search-wrap{
    max-width:520px;
    margin:28px auto 0;
    padding:0 20px;
  }
  #search{
    width:100%;
    padding:13px 20px;
    border:1px solid var(--line);
    border-radius:10px;
    background:var(--card);
    font-family:'Tajawal', sans-serif;
    font-size:15px;
    color:var(--ink);
    outline:none;
    transition:border-color .2s;
  }
  #search:focus{ border-color:var(--gold); }
  #search::placeholder{ color:#B3A98F; }

  main{
    max-width:920px;
    margin:0 auto;
    padding:36px 20px 80px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:14px;
  }
  .surah-card{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    text-decoration:none;
    color:var(--ink);
    transition:transform .15s, border-color .15s, box-shadow .15s;
    position:relative;
    overflow:hidden;
  }
  .surah-card.disabled{
    opacity:.45;
    pointer-events:none;
  }
  .surah-card:not(.disabled):hover{
    transform:translateY(-2px);
    border-color:var(--gold);
    box-shadow:0 6px 18px rgba(124,99,41,0.12);
  }
  .surah-num{
    flex-shrink:0;
    width:38px; height:38px;
    border:1.5px solid var(--gold);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Amiri', serif;
    font-size:15px;
    font-weight:700;
    color:var(--gold-deep);
  }
  .surah-info{ flex:1; min-width:0; }
  .surah-name{
    font-family:'Amiri', serif;
    font-size:19px;
    font-weight:700;
    color:var(--ink);
  }
  .surah-meta{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .ready-badge{
    font-size:11px;
    color:var(--gold-deep);
    background:rgba(168,134,59,0.12);
    padding:3px 8px;
    border-radius:20px;
    flex-shrink:0;
  }
  .empty-msg{
    text-align:center;
    color:var(--ink-soft);
    padding:40px;
    font-size:14px;
  }
  footer{
    text-align:center;
    padding:24px;
    color:var(--ink-soft);
    font-size:12px;
    border-top:1px solid var(--line);
  }
</style>
</head>
<body>

<div class="top-bar">
  <button id="auth-status" class="auth-link">تسجيل الدخول</button>
</div>

<header>
  <h1>مصحف التدبر</h1>
  <p class="tagline">114 سورة — محاور، تفسير، وتدبر في مكان واحد</p>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="ابحث عن سورة بالاسم أو الرقم...">
  </div>
</header>

<main>
  <div id="grid" class="grid"></div>
  <p id="empty" class="empty-msg" style="display:none">لا توجد نتائج مطابقة</p>
</main>

<footer>جاهز للتدبر: سورة البقرة — باقي السور قيد الإضافة تباعاً بإذن الله</footer>

<!-- وحدة المصادقة الإجبارية والمزامنة السحابية (مشتركة لكل الصفحات) -->
<script type="module" src="assets/firebase-sync.js"></script>

<script>
const READY_SURAHS = [2]; // السور اللي محتواها جاهز فعلياً

async function loadSurahs(){
  const res = await fetch('data/surahs-list.json');
  const surahs = await res.json();
  render(surahs);

  document.getElementById('search').addEventListener('input', (e)=>{
    const q = e.target.value.trim();
    const filtered = surahs.filter(s =>
      s.name_ar.includes(q) ||
      s.name_translit.toLowerCase().includes(q.toLowerCase()) ||
      String(s.id) === q
    );
    render(filtered);
  });
}

function render(surahs){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';
  empty.style.display = surahs.length ? 'none' : 'block';

  surahs.forEach(s=>{
    const isReady = READY_SURAHS.includes(s.id);
    const a = document.createElement('a');
    a.className = 'surah-card' + (isReady ? '' : ' disabled');
    a.href = isReady ? `surah.html?id=${s.id}` : '#';
    a.innerHTML = `
      <div class="surah-num">${s.id}</div>
      <div class="surah-info">
        <div class="surah-name">${s.name_ar}</div>
        <div class="surah-meta">${s.type} · ${s.total_verses} آية</div>
      </div>
      ${isReady ? '<span class="ready-badge">جاهزة</span>' : ''}
    `;
    grid.appendChild(a);
  });
}

loadSurahs();
</script>

</body>
</html>
