<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سورة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4EFE4;
    --ink:#2B2620;
    --ink-soft:#6B6355;
    --gold:#A8863B;
    --gold-deep:#7C6329;
    --line:#D9CFB8;
    --card:#FBF8F1;
  }
  --c-purple-bg:#EEEDFE; --c-purple-line:#7F77DD; --c-purple-text:#3C3489;
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
  }
  .top-nav{
    padding:16px 24px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .back-link{
    color:var(--gold-deep);
    text-decoration:none;
    font-size:14px;
    display:flex; align-items:center; gap:6px;
  }
  header{
    text-align:center;
    padding:32px 20px 28px;
    position:relative;
  }
  h1{
    font-family:'Amiri', serif;
    font-size:38px;
    font-weight:700;
    color:var(--gold-deep);
  }
  .surah-sub{
    margin-top:8px;
    font-size:14px;
    color:var(--ink-soft);
  }

  main{
    max-width:760px;
    margin:0 auto;
    padding:12px 20px 80px;
  }

  /* ===== رابط المقدمة (شكل مختلف بسيط عن بطاقات المحاور) ===== */
  .muqaddimah-link{
    display:flex;
    align-items:center;
    gap:14px;
    background:var(--card);
    border:1px dashed var(--gold);
    border-radius:14px;
    padding:16px 20px;
    margin-bottom:18px;
    text-decoration:none;
    color:inherit;
    transition:background .15s, border-color .15s;
  }
  .muqaddimah-link:hover{
    background:rgba(168,134,59,0.06);
    border-color:var(--gold-deep);
  }
  .muqaddimah-icon{
    flex-shrink:0;
    width:34px; height:34px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--gold);
    color:#fff;
    font-size:16px;
  }
  .muqaddimah-title{
    font-family:'Amiri', serif;
    font-size:18px;
    font-weight:700;
    color:var(--gold-deep);
  }
  .muqaddimah-sub{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:2px;
  }

  .mahwar-block{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:18px;
    overflow:hidden;
  }
  .mahwar-header{
    display:flex; align-items:center; gap:14px;
    padding:18px 20px;
    cursor:pointer;
    user-select:none;
  }
  .mahwar-num{
    flex-shrink:0;
    width:34px; height:34px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Amiri', serif;
    font-weight:700;
    font-size:15px;
    background:var(--paper-color, rgba(168,134,59,0.15));
    color:var(--text-color, var(--gold-deep));
  }
  .mahwar-title{
    flex:1;
    font-family:'Amiri', serif;
    font-size:19px;
    font-weight:700;
  }
  .mahwar-range{
    font-size:12px;
    color:var(--ink-soft);
    background:var(--paper);
    padding:4px 10px;
    border-radius:20px;
    flex-shrink:0;
  }
  .chevron{
    transition:transform .2s;
    color:var(--ink-soft);
    flex-shrink:0;
  }
  .mahwar-block.open .chevron{ transform:rotate(180deg); }

  .subsections{
    display:none;
    padding:0 20px 18px;
  }
  .mahwar-block.open .subsections{ display:block; }

  .sub-item{
    padding:14px 16px;
    border-top:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:inherit;
    transition:background .15s;
  }
  .sub-item:hover{
    background:rgba(168,134,59,0.06);
  }
  .sub-dot{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--gold);
    flex-shrink:0;
  }
  .sub-title{
    flex:1;
    font-size:15px;
  }
  .sub-range{
    font-size:12px;
    color:var(--ink-soft);
    flex-shrink:0;
  }

  .loading, .error{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
  }
</style>
</head>
<body>

<div class="top-nav">
  <a href="index.html" class="back-link">← كل السور</a>
</div>

<header id="surah-header">
  <h1 id="surah-name">...</h1>
  <p class="surah-sub" id="surah-meta"></p>
</header>

<main>
  <div id="muqaddimah-container"></div>
  <div id="content" class="loading">جاري التحميل...</div>
</main>

<script>
const COLOR_MAP = {
  purple: {bg:'#EEEDFE', text:'#3C3489'},
  teal:   {bg:'#E1F5EE', text:'#085041'},
  coral:  {bg:'#FAECE7', text:'#712B13'},
  pink:   {bg:'#FBEAF0', text:'#72243E'}
};

function getSurahId(){
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

// خريطة صريحة لمجلدات السور الجاهزة (لتجنب أخطاء توليد الأسماء تلقائياً)
const SURAH_FOLDERS = {
  2: 'surahs/002-baqarah'
};

function surahFolder(id, name_translit){
  if(SURAH_FOLDERS[id]) return SURAH_FOLDERS[id];
  // احتياطي للسور المستقبلية التي لم تُضف بعد لخريطة أعلاه
  const padded = String(id).padStart(3,'0');
  const slug = name_translit.toLowerCase().replace(/'/g,'').replace(/\s+/g,'-');
  return `surahs/${padded}-${slug}`;
}

async function init(){
  const id = getSurahId();
  if(!id){
    document.getElementById('content').innerHTML = '<div class="error">لم يتم تحديد سورة</div>';
    return;
  }

  try{
    const listRes = await fetch('data/surahs-list.json');
    const list = await listRes.json();
    const surahBasic = list.find(s => String(s.id) === String(id));
    if(!surahBasic) throw new Error('سورة غير موجودة');

    document.getElementById('surah-name').textContent = 'سورة ' + surahBasic.name_ar;
    document.getElementById('surah-meta').textContent = `${surahBasic.type} · ${surahBasic.total_verses} آية`;

    const folder = surahFolder(id, surahBasic.name_translit);
    const infoRes = await fetch(`${folder}/info.json`);
    if(!infoRes.ok) throw new Error('لم يتم إعداد محتوى هذه السورة بعد');
    const info = await infoRes.json();

    // ===== عرض رابط المقدمة (إن وُجد) قبل قائمة المحاور =====
    if(info.muqaddimah){
      const muqContainer = document.getElementById('muqaddimah-container');
      const muqHref = `${folder}/mahawir-pages/${info.muqaddimah.file}`;
      muqContainer.innerHTML = `
        <a class="muqaddimah-link" href="${muqHref}">
          <div class="muqaddimah-icon">✦</div>
          <div>
            <div class="muqaddimah-title">${info.muqaddimah.title}</div>
            <div class="muqaddimah-sub">تعريف بالسورة وفضلها قبل بدء المحاور</div>
          </div>
        </a>
      `;
    }

    const contentEl = document.getElementById('content');
    contentEl.className = '';
    contentEl.innerHTML = '';

    for(const [idx, mahwar] of info.mahawir.entries()){
      const colors = COLOR_MAP[mahwar.color] || COLOR_MAP.purple;
      const pageHref = `${folder}/mahawir-pages/${mahwar.file.replace('.json','.html')}`;

      const link = document.createElement('a');
      link.className = 'mahwar-block';
      link.href = pageHref;
      link.style.display = 'block';
      link.style.textDecoration = 'none';
      link.style.color = 'inherit';

      link.innerHTML = `
        <div class="mahwar-header">
          <div class="mahwar-num" style="background:${colors.bg}; color:${colors.text}">${idx+1}</div>
          <div class="mahwar-title">${mahwar.title}</div>
          <div class="mahwar-range">آيات ${mahwar.range}</div>
        </div>
      `;
      contentEl.appendChild(link);
    }

  }catch(err){
    document.getElementById('content').innerHTML = `<div class="error">${err.message}</div>`;
  }
}

init();
</script>

</body>
</html>
